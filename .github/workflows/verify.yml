name: Verify Services

on:
  schedule:
    # Monthly on the 1st at 03:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run verification crawler
        run: python scripts/verify.py

      - name: Commit and push results
        run: |
          git config user.name  "gold-402-bot"
          git config user.email "gold-402-bot@24klabs.ai"
          git add directory/services.json
          if git diff --cached --quiet; then
            echo "No changes after verification run"
          else
            SUMMARY=$(python scripts/verify_summary.py commit)
            git commit -m "verify: monthly probe run -- ${SUMMARY}"
            git push
          fi

      - name: Print verification summary
        if: always()
        run: python scripts/verify_summary.py full
