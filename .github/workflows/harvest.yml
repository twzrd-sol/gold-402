name: Harvest CDP Bazaar

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run harvest
        run: python scripts/harvest.py

      - name: Generate pre-sliced JSON files
        run: python scripts/slice_services.py

      - name: Commit and push if changed
        run: |
          git config user.name  "gold-402-bot"
          git config user.email "gold-402-bot@24klabs.ai"
          git add directory/services.json directory/by_type/
          if git diff --cached --quiet; then
            echo "No changes -- services.json and slices unchanged"
          else
            COUNT=$(python scripts/harvest_summary.py count)
            git commit -m "harvest: CDP Bazaar update (${COUNT} services)"
            git push
          fi

      - name: Print harvest summary
        if: always()
        run: python scripts/harvest_summary.py full
