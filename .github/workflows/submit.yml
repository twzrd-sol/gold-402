name: Submission Gate

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'directory/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract submitted URL from PR body
        id: extract_url
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Look for a URL in the PR body -- format: "URL: https://..."
          URL=$(echo "$PR_BODY" | \
            grep -oP '(?i)(url|endpoint|service):\s*\K(https?://[^\s]+)' | head -1)
          if [ -z "$URL" ]; then
            # Fallback: grab the first https:// URL in the body
            URL=$(echo "$PR_BODY" | \
              grep -oP 'https?://[^\s\"]+' | head -1)
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Extracted URL: $URL"

      - name: Fail if no URL found
        if: steps.extract_url.outputs.url == ''
        run: |
          echo "No URL found in PR body. Please include your endpoint URL."
          echo "Format: URL: https://your-service.com/api/endpoint"
          exit 1

      - name: Checkout main branch for services.json
        run: git checkout origin/main -- directory/services.json

      - name: Run submission check
        id: check
        run: python scripts/submit_check.py "${{ steps.extract_url.outputs.url }}"

      - name: Read check result
        id: result
        if: always()
        run: |
          if [ -f submit_result.json ]; then
            RESULT=$(python -c "import json; d=json.load(open('submit_result.json')); print(d['result'])")
            REASON=$(python -c "import json; d=json.load(open('submit_result.json')); print(d['reason'])")
            echo "result=$RESULT" >> "$GITHUB_OUTPUT"
            echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "reason=check script did not produce output" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR -- pass
        if: steps.result.outputs.result == 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "**Gold-402 Verification: PASSED**",
                "",
                "Service URL: `${{ steps.extract_url.outputs.url }}`",
                "Result: ${{ steps.result.outputs.reason }}",
                "",
                "This PR has been approved for merge. A maintainer will review and merge shortly.",
                "",
                "---",
                "*Verified by Gold-402. Verification confirms x402 technical compliance only.*",
                "*It does not constitute endorsement of the service.*"
              ].join('\n')
            })

      - name: Comment on PR -- fail
        if: steps.result.outputs.result != 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "**Gold-402 Verification: FAILED**",
                "",
                "Service URL: `${{ steps.extract_url.outputs.url }}`",
                "Reason: ${{ steps.result.outputs.reason }}",
                "",
                "This PR cannot be merged until the issue is resolved.",
                "Fix the issue and push a new commit to re-run verification.",
                "",
                "Common causes:",
                "- Endpoint does not return HTTP 402 on unauthenticated requests",
                "- URL is unreachable or times out",
                "- Service is already listed",
                "",
                "---",
                "*Gold-402 verifies x402 technical compliance only.*"
              ].join('\n')
            })

      - name: Auto-close failing PRs
        if: steps.result.outputs.result != 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            })

      - name: Label passing PRs
        if: steps.result.outputs.result == 'pass'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['verified', 'ready-to-merge']
              })
            } catch(e) {
              console.log('Labels not found, skipping:', e.message)
            }

      - name: Fail workflow if check failed
        if: steps.result.outputs.result != 'pass'
        run: exit 1
